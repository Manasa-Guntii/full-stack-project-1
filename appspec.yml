version: 0.0

os: linux

files:
  - source: demo/target/demo-0.0.1-SNAPSHOT.jar
    destination: /home/ec2-user/app

hooks:
  BeforeInstall:
    - location: scripts/cleanup.sh
      timeout: 300
      runas: ec2-user

  AfterInstall:
    - location: scripts/deploy.sh
      timeout: 300
      runas: ec2-user